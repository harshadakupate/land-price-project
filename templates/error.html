<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error — Land AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="login-container">
    <div class="card error-box" style="max-width:500px; text-align:center;">
        <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
        <h2 style="color:#ff6b6b; margin-bottom:14px;">Something went wrong</h2>
        <p style="color:rgba(255,255,255,0.6); font-size:14px; margin-bottom:20px; word-break:break-all;">{{ error }}</p>
        <a href="/dashboard"><button style="width:auto; padding:10px 28px;">🏠 Go to Dashboard</button></a>
    </div>
</div>
</body>
</html>
